version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: ordr
    main: ./cmd/ordr
    binary: ordr
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: ordr
    builds: [ordr]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: ordr
    repository:
      owner: "{{ .Env.HOMEBREW_TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/{{ .Env.HOMEBREW_TAP_OWNER }}/ordr"
    description: "Rule-based file organizer CLI"
    license: "MIT"
    test: |
      system "#{bin}/ordr --version"
    install: |
      bin.install "ordr"
